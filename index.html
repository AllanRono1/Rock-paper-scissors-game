<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, paper scissors</title>
    <link href="style.css" rel="stylesheet" />
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Welcome to the Game</h1>
    <div class="resultsContainer">
        <div id="playerpoints-el">Player scores</div>
        <div id="computerpoints-el">Trinket scores</div>
    </div>
    <h2>Rock, paper, scissors</h2>
    <p id="rule-el"></p>
    <div class="container">
        <input class="rivals" type="text" id="playerscore-el" />
        <p class="rivals" id="compscore-el">Trinket the Computer bear🐻</p>
    </div>
    <div class="resultsContainer">
    <ul id="results-el"></ul>
    <ul id="comp-results-el"></ul>
    </div>
    <p id="winner-el"></p>
    <button id="button-el">Go!</button>
    
</body>
</html>
